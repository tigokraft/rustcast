<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only the vibecast user can own the SystemBridge name -->
  <policy user="vibecast">
    <allow own="com.vibecast.SystemBridge"/>
    <!-- Allow system-bridge to talk to NetworkManager -->
    <allow send_destination="org.freedesktop.NetworkManager"/>
    <!-- Allow system-bridge to talk to BlueZ for PIN-less agent and auto-trust -->
    <allow send_destination="org.bluez"/>
  </policy>

  <!-- Allow anyone to invoke methods on the SystemBridge (e.g. the Tauri Shell run by the desktop user) -->
  <policy context="default">
    <allow send_destination="com.vibecast.SystemBridge"/>
  </policy>
</busconfig>
